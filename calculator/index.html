<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pack Smart</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --card: #222222;
    --border: #2e2e2e;
    --orange: #f97316;
    --orange-dim: #c45d10;
    --amber: #fbbf24;
    --green: #4ade80;
    --text: #f0ede8;
    --muted: #888;
    --casual: #f97316;
    --dress: #a78bfa;
    --active: #34d399;
    --misc: #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 16px;
  }

  h1.logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 4px;
    color: var(--orange);
    text-align: center;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* TRIP DETAILS */
  .trip-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
  }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--orange);
    margin-bottom: 14px;
  }

  .trip-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .trip-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .trip-field label {
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .trip-field input[type="number"] {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .trip-field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .trip-field input[type="number"]:focus { border-color: var(--orange); }

  .toggle-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .toggle-btn {
    flex: 1;
    min-width: 120px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .toggle-btn.on {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
    font-weight: 700;
  }

  /* GARMENTS */
  .garments-section {
    margin-bottom: 16px;
  }

  .category-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
  }
  .cat-header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .garment-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 16px;
    border-top: 1px solid var(--border);
    transition: background 0.15s, opacity 0.2s;
  }
  .garment-row:hover { background: rgba(255,255,255,0.03); }
  .garment-row.g-checked { opacity: 0.4; }
  .garment-row.g-checked .garment-name { text-decoration: line-through; color: var(--muted); }

  .g-check-box {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 10px;
    transition: all 0.2s;
  }
  .g-checked-box {
    background: var(--green);
    border-color: var(--green);
  }

  .garment-name {
    font-size: 0.88rem;
    color: var(--text);
  }

  .garment-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 1px;
    min-width: 32px;
    text-align: right;
  }

  /* CHECKLIST */
  .checklist-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
  }

  .checklist-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .progress-pill {
    background: var(--card);
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 4px 10px;
    color: var(--green);
  }

  .progress-bar-wrap {
    background: var(--card);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--amber));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item.checked { opacity: 0.45; }

  .check-box {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .check-item.checked .check-box {
    background: var(--green);
    border-color: var(--green);
  }
  .check-box svg { display: none; }
  .check-item.checked .check-box svg { display: block; }

  .check-label {
    font-size: 0.9rem;
    flex: 1;
  }
  .check-item.checked .check-label {
    text-decoration: line-through;
    color: var(--muted);
  }

  .delete-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 6px;
    flex-shrink: 0;
    transition: color 0.2s, background 0.2s;
  }
  .delete-btn:hover { color: #ff4444; background: rgba(255,68,68,0.1); }

  .add-item-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .add-item-row input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    padding: 9px 12px;
    outline: none;
  }
  .add-item-row input:focus { border-color: var(--orange); }
  .add-btn {
    background: var(--orange);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    font-size: 1.3rem;
    font-weight: 700;
    padding: 0 16px;
    transition: background 0.2s;
  }
  .add-btn:hover { background: var(--orange-dim); }

  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 10px;
    margin-top: 12px;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--orange); color: var(--orange); }
</style>
</head>
<body>

<h1 class="logo">PACK SMART</h1>
<p class="subtitle">Trip Packing Calculator</p>

<!-- TRIP DETAILS -->
<div class="trip-card">
  <div class="section-label">Trip Details</div>
  <div class="trip-grid">
    <div class="trip-field">
      <label>Total Days</label>
      <input type="number" id="days" value="8" min="1" max="60">
    </div>
    <div class="trip-field">
      <label>Total Nights</label>
      <input type="number" id="nights" value="7" min="0" max="60">
    </div>
    <div class="trip-field">
      <label>Dressy Events</label>
      <input type="number" id="dressy" value="1" min="0" max="20">
    </div>
    <div class="trip-field">
      <label>Active Days</label>
      <input type="number" id="active" value="3" min="0" max="30">
    </div>
  </div>
  <div class="toggle-row">
    <button class="toggle-btn" id="btn-water" onclick="toggle('water', this)">🏊 Water / Beach</button>
    <button class="toggle-btn" id="btn-washer" onclick="toggle('washer', this)">🧺 Washer Access</button>
    <button class="toggle-btn" id="btn-cold" onclick="toggle('cold', this)">🧥 Cold Weather</button>
  </div>
</div>

<!-- GARMENTS -->
<div class="garments-section" id="garments-output"></div>

<!-- CHECKLIST -->
<div class="checklist-card">
  <div class="checklist-header">
    <div class="section-label" style="margin-bottom:0">Must-Pack List</div>
    <div class="progress-pill" id="progress-text">0 / 0</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>
  <div id="checklist"></div>
  <div class="add-item-row">
    <input type="text" id="new-item" placeholder="Add item…" onkeydown="if(event.key==='Enter') addItem()">
    <button class="add-btn" onclick="addItem()">+</button>
  </div>
  <button class="reset-btn" onclick="resetChecks()">↺ Reset Checklist</button>
  <button class="reset-btn" style="margin-top:6px" onclick="resetGarmentChecks()">↺ Reset Garment Checks</button>
</div>

<script>
const defaults = { days: 8, nights: 7, dressy: 1, active: 3, water: true, washer: false, cold: false };
const state = Object.assign({}, defaults, JSON.parse(localStorage.getItem('tripState') || '{}'));

function saveState() { try { localStorage.setItem('tripState', JSON.stringify(state)); } catch(e) {} }

// Apply saved numeric inputs to the DOM
['days','nights','dressy','active'].forEach(id => {
  document.getElementById(id).value = state[id];
});

// Apply saved toggle button states
['water','washer','cold'].forEach(key => {
  const btn = document.getElementById('btn-' + key);
  if (btn) btn.classList.toggle('on', !!state[key]);
});

function toggle(key, btn) {
  state[key] = !state[key];
  btn.classList.toggle('on', state[key]);
  saveState();
  recalc();
}

['days','nights','dressy','active'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    state[id] = parseInt(e.target.value) || 0;
    saveState();
    recalc();
  });
});

function calc() {
  const { days, nights, dressy, active, water, washer, cold } = state;
  const div = washer ? 2 : 1; // halve if washer access
  const uw = Math.ceil(nights / div) + 1;
  const tshirts = Math.ceil(days / div);
  const bottoms = Math.max(2, Math.ceil(days / (div * 2)));
  const sweater = cold ? Math.ceil(days / 3) : 0;
  const sneakers = 1;
  const flipflops = water ? 1 : 0;
  const sleep = Math.ceil(nights / (div * 2 || 1));
  const socks = Math.ceil(days / div);
  const activeWear = active > 0 ? Math.ceil(active / div) : 0;
  const swimwear = water ? (washer ? 1 : Math.min(2, Math.ceil(days / 4))) : 0;

  return {
    casual: [
      { name: 'T-Shirts', count: tshirts },
      { name: 'Shorts or Jeans', count: bottoms },
      { name: 'Sweater / Jacket', count: sweater },
      { name: 'Underwear', count: uw },
      { name: sneakers > 0 && flipflops > 0 ? 'Sneakers + Flip-flops' : 'Sneakers', count: sneakers + flipflops },
      { name: 'Sleepwear', count: sleep },
    ],
    dress: [
      { name: 'Dress Shirts', count: dressy },
      { name: 'Socks', count: socks },
      { name: 'Dress Slacks / Khakis', count: Math.min(dressy, 2) },
      { name: 'Dress Shoes', count: dressy > 0 ? 1 : 0 },
    ],
    active: [
      { name: 'Activewear (tops & bottoms)', count: activeWear },
      { name: 'Swimwear', count: swimwear },
    ],
  };
}

const catColors = {
  casual: { color: '#f97316', label: 'CASUAL WEAR' },
  dress:  { color: '#a78bfa', label: 'DRESS WEAR' },
  active: { color: '#34d399', label: 'ACTIVE WEAR' },
};

function recalc() {
  const data = calc();
  const container = document.getElementById('garments-output');
  container.innerHTML = '';

  Object.entries(data).forEach(([cat, items]) => {
    const { color, label } = catColors[cat];
    const block = document.createElement('div');
    block.className = 'category-block';

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.style.color = color;
    header.innerHTML = `<span class="dot" style="background:${color}"></span>${label}`;
    block.appendChild(header);

    items.forEach(item => {
      const key = cat + ':' + item.name;
      const checked = !!garmentChecks[key];
      const row = document.createElement('div');
      row.className = 'garment-row' + (checked ? ' g-checked' : '');
      row.style.cursor = 'pointer';
      const checkSvg = checked ? '<svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="#0f0f0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '';
      row.innerHTML = '<div class="g-check-box' + (checked ? ' g-checked-box' : '') + '">' + checkSvg + '</div><span class="garment-name">' + item.name + '</span><span class="garment-count" style="color:' + color + '">' + item.count + '</span>';
      row.addEventListener('click', () => {
        garmentChecks[key] = !garmentChecks[key];
        saveGarmentChecks();
        recalc();
      });
      block.appendChild(row);
    });

    container.appendChild(block);
  });
}

// CHECKLIST
const defaultItems = [
  'Passport / ID', 'Wallet + Cash', 'Phone + Charger', 'Sunglasses', 'Medications',
  'Toothbrush + Paste', 'Facial Products', 'Deodorant', 'Q-tips', 'Brush / Comb',
  'Laptop', 'Earbuds / Headphones', 'Camera', 'Belt', 'Umbrella', 'Clove Oil',
  'Back Scratcher', 'Portable Palm Fan', 'Hoodie', 'Polo Shirt', 'Cane'
];

let garmentChecks = JSON.parse(localStorage.getItem('garmentChecks') || '{}');
function saveGarmentChecks() { try { localStorage.setItem('garmentChecks', JSON.stringify(garmentChecks)); } catch(e) {} }

let checkItems = JSON.parse(localStorage.getItem('packItems') || 'null') || defaultItems.map(t => ({ text: t, checked: false }));

function saveChecks() { try { localStorage.setItem('packItems', JSON.stringify(checkItems)); } catch(e) {} }

function renderChecklist() {
  const container = document.getElementById('checklist');
  container.innerHTML = '';
  checkItems.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'check-item' + (item.checked ? ' checked' : '');
    div.onclick = () => { checkItems[i].checked = !checkItems[i].checked; saveChecks(); renderChecklist(); };
    div.innerHTML = `
      <div class="check-box">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1 5l3.5 3.5L11 1" stroke="#0f0f0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="check-label">${item.text}</span>
      <button class="delete-btn" title="Remove item">−</button>
    `;
    div.querySelector('.delete-btn').addEventListener('click', e => {
      e.stopPropagation();
      checkItems.splice(i, 1);
      saveChecks();
      renderChecklist();
    });
    container.appendChild(div);
  });

  const total = checkItems.length;
  const done = checkItems.filter(i => i.checked).length;
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
  document.getElementById('progress-bar').style.width = total ? `${(done/total)*100}%` : '0%';
}

function addItem() {
  const input = document.getElementById('new-item');
  const val = input.value.trim();
  if (!val) return;
  checkItems.push({ text: val, checked: false });
  input.value = '';
  saveChecks();
  renderChecklist();
}

function resetChecks() {
  checkItems = checkItems.map(i => ({ ...i, checked: false }));
  saveChecks();
  renderChecklist();
}

function resetGarmentChecks() {
  garmentChecks = {};
  saveGarmentChecks();
  recalc();
}

recalc();
renderChecklist();
</script>
</body>
</html>
